<li class="flex items-center justify-center w-full">
  <a
    routerLink=""
    routerLinkActive="sm:border-b-4 sm:border-accent-500"
    [routerLinkActiveOptions]="{
      matrixParams: 'ignored',
      queryParams: 'ignored',
      paths: 'exact',
      fragment: 'exact',
    }"
    [fragment]="route()"
    (click)="onClick.emit()"
    class="border-0 text-primary-50 text-3xl sm:text-lg md:text-xl px-5 py-2 w-full flex justify-center max-sm:hover:scale-125 max-sm:duration-200 sm:duration-500 sm:items-center sm:border-b sm:border-accent-950"
    [ngClass]="{
      'sm:h-20': !adjust(),
      'sm:h-16': adjust(),
      'sm:border-accent-950': !lightBorder(),
      'sm:border-accent-700': lightBorder(),
    }"
  >
    {{ text() }}
  </a>
</li>
